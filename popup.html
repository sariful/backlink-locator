<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: sans-serif;
            padding: 10px;
            width: 250px;
        }

        textarea {
            width: 100%;
            height: 80px;
            box-sizing: border-box;
            padding: 5px;
        }

        button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #0056b3;
        }

        .success {
            color: green;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>

<body>
    <h3>Target Domains</h3>
    <p style="font-size: 13px; color: #555;">Enter domains to search for (comma or newline separated):</p>
    <textarea id="domains" placeholder="zubizi.com, example.com"></textarea>
    <button id="save">Save & Reload Page</button>
    <div id="status" class="success">Saved! Reloading...</div>
    <script src="popup.js"></script>
</body>

</html>
